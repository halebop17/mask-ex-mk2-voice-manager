<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mask1EX MK2 Voice Organizer — macOS app</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/MaskApp.jsx"></script>
<script type="text/babel">
  const { MaskFrame } = window;

  // ── helpers to build selection sets ────────────────────────────────
  const set = (...xs) => new Set(xs);
  const range = (a, b) => { const s = new Set(); for (let i = a; i <= b; i++) s.add(i); return s; };

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="frames"
          title="Mask1EX MK2 Voice Organizer"
          subtitle="Native macOS app · three reference frames">

          <DCArtboard
            id="f1-connected"
            label="01 · Connected · both panes populated"
            width={1180} height={720}>
            <MaskFrame
              connected={true}
              focusedPane="user"
              userSel={set(2, 4, 5, 7)}
              factorySel={set()}
              factoryScroll={0}
              userScroll={0}
              toast="Last action: imported user.bank · 12:04"
            />
          </DCArtboard>

          <DCArtboard
            id="f2-bulk-read"
            label="02 · Bulk read in progress (factory bank)"
            width={1180} height={720}>
            <MaskFrame
              connected={true}
              focusedPane="factory"
              factorySel={set()}
              userSel={set()}
              factoryScroll={5}
              userScroll={0}
              progress={{ label: 'Reading factory voice 142 of 377…', pct: 38 }}
            />
          </DCArtboard>

          <DCArtboard
            id="f3-rename"
            label="03 · Rename in place (8-char ASCII)"
            width={1180} height={720}>
            <MaskFrame
              connected={true}
              focusedPane="user"
              userSel={set(7)}
              factorySel={set()}
              factoryScroll={0}
              userScroll={0}
              renamingIdx={7}
              renameValue="BSCRUNCH"
              toast="Editing slot 008 · 8 / 8 chars"
            />
          </DCArtboard>

        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
